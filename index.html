<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundwave — Music Player</title>
    <link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;500;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Toast -->
<div class="toast" id="toast"></div>

<div class="app-wrapper">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 0 18A9 9 0 0 0 12 3zm3.5 13.5c-.15.25-.47.33-.72.18-1.97-1.2-4.44-1.47-7.35-.8-.28.06-.56-.11-.62-.39-.06-.28.11-.56.39-.62 3.19-.73 5.93-.41 8.12.93.25.15.33.47.18.7zm.93-2.1c-.19.3-.59.4-.89.21-2.25-1.38-5.67-1.78-8.33-0.97-.33.1-.68-.09-.78-.42-.1-.33.09-.68.42-.78 3.03-.93 6.8-.47 9.37 1.1.3.19.4.59.21.86zm.08-2.2C13.7 10.7 9.16 10.56 6.5 11.36c-.38.11-.79-.1-.9-.49-.11-.38.1-.79.49-.9 3.06-.93 8.1-.75 11.28 1.19.34.2.45.64.25.98-.2.34-.63.45-.97.26z"/></svg>
        </div>
        <span class="logo-name">Soundwave</span>
      </div>

      <nav>
        <a class="nav-item active" href="#">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          Home
        </a>
        <a class="nav-item" href="#">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search
        </a>
      </nav>
    </div>

    <div class="sidebar-library">
      <div class="lib-header">
        <span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H8a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-6 2.5c1.38 0 2.5 1.12 2.5 2.5S15.38 9.5 14 9.5 11.5 8.38 11.5 7 12.62 4.5 14 4.5zm6 11h-12v-1c0-2 4-3.1 6-3.1s6 1.1 6 3.1v1z"/></svg>
          Your Library
        </span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="cursor:pointer;color:var(--text-gray)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </div>

      <div class="playlist-list" id="playlistList"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="main-header">
      <div class="nav-arrows">
        <button class="arrow-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 16.58L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
        </button>
        <button class="arrow-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </button>
      </div>
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" fill="none" stroke="#888" stroke-width="2"/><path d="m21 21-4.35-4.35" stroke="#888" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" placeholder="What do you want to listen to?" id="searchInput" oninput="filterTracks(this.value)">
      </div>
      <div class="user-area">
        <div class="user-pill">
          <div class="user-avatar">U</div>
          User
        </div>
      </div>
    </div>

    <div class="content-scroll" id="contentScroll">
      <!-- Featured Banner -->
      <div class="featured-banner" id="featuredBanner" style="background: linear-gradient(135deg, #1a1a6e, #2d5016);">
        <div class="featured-art" id="featuredArt">🎵</div>
        <div class="featured-info">
          <small>Featured Playlist</small>
          <h2 id="featuredTitle">Top Hits 2024</h2>
          <p id="featuredDesc">The biggest free tracks right now • 12 songs</p>
        </div>
      </div>

      <!-- Genres -->
      <div class="mb-3">
        <div class="genre-tag active" onclick="filterGenre('all', this)">All</div>
        <div class="genre-tag" onclick="filterGenre('pop', this)">Pop</div>
        <div class="genre-tag" onclick="filterGenre('jazz', this)">Jazz</div>
        <div class="genre-tag" onclick="filterGenre('classical', this)">Classical</div>
        <div class="genre-tag" onclick="filterGenre('electronic', this)">Electronic</div>
        <div class="genre-tag" onclick="filterGenre('ambient', this)">Ambient</div>
      </div>

      <!-- Cards Row -->
      <div class="section-title">
        <span>Featured Artists</span>
        <a href="#">Show all</a>
      </div>
      <div class="cards-grid" id="artistCards"></div>

      <!-- Track List -->
      <div class="section-title">
        <span>All Tracks</span>
      </div>
      <div class="track-list">
        <div id="trackList"></div>
      </div>
    </div>
  </main>
</div>

<!-- Player Bar -->
<div class="player-bar">
  <!-- Now Playing -->
  <div class="now-playing">
    <div class="now-art" id="nowArt">🎵</div>
    <div class="now-info">
      <div class="now-title" id="nowTitle">Select a track</div>
      <div class="now-artist" id="nowArtist">—</div>
    </div>
    <div class="now-actions">
      <button class="heart-btn" id="likeBtn" onclick="toggleLike()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>
  </div>

  <!-- Center Controls -->
  <div class="center-controls">
    <div class="ctrl-btns">
      <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="prevTrack()" title="Previous">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="play-btn" id="mainPlayBtn" onclick="togglePlay()">
        <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pauseIcon" width="18" height="18" viewBox="0 0 24 24" fill="#000" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Next">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
    </div>
    <div class="progress-wrap">
      <span class="time-label" id="curTime">0:00</span>
      <div class="progress-track" id="progressTrack" onclick="seekTo(event)">
        <div class="progress-fill" id="progressFill" style="width:0%">
          <div class="progress-thumb"></div>
        </div>
      </div>
      <span class="time-label right" id="durTime">0:00</span>
    </div>
  </div>

  <!-- Right Controls -->
  <div class="right-controls">
    <button class="ctrl-btn" onclick="toggleMute()" id="volIcon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    </button>
    <div class="vol-wrap">
      <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
    </div>
    <button class="ctrl-btn" title="Queue">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
    </button>
  </div>
</div>

<audio id="audioEl"></audio>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
